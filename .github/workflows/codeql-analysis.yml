name: "Code scanning - action"

on:
  push:
    branches: [master, 1.5]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [master, 1.5]
  schedule:
    - cron: '0 19 * * 1'

jobs:
  CodeQL-Build:

    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # We must fetch at least the immediate parents so that if this is
        # a pull request then we can checkout the head.
        fetch-depth: 2

    # If this run was triggered by a pull request event, then checkout
    # the head of the pull request instead of the merge commit.
    - run: git checkout HEAD^2
      if: ${{ github.event_name == 'pull_request' }}

    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: temurin
    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      # Override language selection by uncommenting this and choosing your languages
      with:
        languages: java

    - name: Cache local Maven repository
      uses: actions/cache@v5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-jdk11-maven-v2-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-jdk11-maven-v2-
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-provider: basic
    - name: Build with Maven
      run: ./mvnw --no-transfer-progress -B -e install --file pom.xml
    - name: Upload Maven test reports
      if: failure()
      uses: actions/upload-artifact@v6
      with:
        name: surefire-reports-codeql
        path: |
          **/target/surefire-reports/**
          **/target/failsafe-reports/**
    - name: Build Gradle plugin
      working-directory: modules/swagger-gradle-plugin
      run: ./gradlew build --info --stacktrace --no-daemon
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
